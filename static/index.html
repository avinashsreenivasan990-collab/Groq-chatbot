<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangChain Chat — Stateless AI Interface</title>
  <meta name="description" content="A premium stateless chatbot interface powered by LangChain. Each query is processed independently without conversation memory.">
  <link rel="stylesheet" href="style.css">

  <!-- Markdown & Sanitization CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-canvas">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <div class="app-container">

    <!-- ======================== SIDEBAR ======================== -->
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
          </div>
          <h2>LangChain</h2>
        </div>
        <p>Stateless Interface</p>
      </div>

      <div class="form-group">
        <label for="provider">LLM Provider</label>
        <select id="provider" class="form-control">
          <option value="groq">Groq (Fast)</option>
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>

      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" class="form-control"
               placeholder="Enter your API key" />
      </div>

      <div class="form-group">
        <label for="model-name">Model</label>
        <input type="text" id="model-name" class="form-control" value="llama-3.3-70b-versatile" />
      </div>

      <div class="form-group">
        <label for="system-prompt">System Prompt <span style="color:var(--text-tertiary)">(optional)</span></label>
        <textarea id="system-prompt" class="form-control" rows="3"
                  placeholder="e.g. You are a helpful coding assistant..."></textarea>
      </div>

      <div class="form-group">
        <label for="temperature">Temperature: <span id="temp-val">0.7</span></label>
        <input type="range" id="temperature" class="form-control"
               min="0" max="1" step="0.1" value="0.7" />
      </div>

      <div class="stateless-badge">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        Stateless — No conversation memory
      </div>
    </aside>

    <!-- ======================== MAIN CHAT ======================== -->
    <main class="main-chat glass-panel" id="main-chat">
      <div class="chat-header">
        <div class="title">
          <span class="status-dot"></span>
          Chat Interface
        </div>
        <div class="header-actions">
          <button id="clear-btn" title="Clear conversation">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
            Clear
          </button>
          <button id="toggle-dev-btn" title="Toggle developer console">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
            Dev
          </button>
        </div>
      </div>

      <div class="chat-history" id="chat-history">
        <!-- Welcome screen rendered by JS -->
      </div>

      <div class="chat-input-container">
        <div class="input-wrapper">
          <textarea id="prompt-input" placeholder="Ask me anything..." rows="1"></textarea>
          <button id="send-btn" disabled aria-label="Send message">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- ======================== DEV CONSOLE ======================== -->
    <aside class="dev-console glass-panel hidden" id="dev-console">
      <div class="dev-header">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
        Execution Logs
      </div>
      <div class="dev-content" id="dev-content"></div>
    </aside>
  </div>

  <!-- ======================== APPLICATION LOGIC ======================== -->
  <script>
    // ---- DOM References ----
    const $ = (id) => document.getElementById(id);
    const el = {
      provider:     $('provider'),
      apiKey:       $('api-key'),
      modelName:    $('model-name'),
      systemPrompt: $('system-prompt'),
      tempSlider:   $('temperature'),
      tempVal:      $('temp-val'),
      chatHistory:  $('chat-history'),
      promptInput:  $('prompt-input'),
      sendBtn:      $('send-btn'),
      clearBtn:     $('clear-btn'),
      toggleDev:    $('toggle-dev-btn'),
      devConsole:   $('dev-console'),
      devContent:   $('dev-content'),
      toasts:       $('toast-container'),
    };

    // Backend URL (Flask server)
    const API_BASE = 'http://localhost:5000';

    // ---- Application State ----
    const state = {
      isGenerating: false,
      isDevOpen: false,
      messageCount: 0,
    };

    // ---- Suggestion Chips ----
    const suggestions = [
      "Explain quantum computing",
      "Write a Python fibonacci function",
      "What is LangChain?",
      "Tips for learning TypeScript",
    ];

    // ---- Welcome Screen ----
    function renderWelcome() {
      const chips = suggestions
        .map(s => `<button class="welcome-chip" data-prompt="${s}">${s}</button>`)
        .join('');

      el.chatHistory.innerHTML = `
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-orb">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
              </path>
            </svg>
          </div>
          <h3>How can I help you?</h3>
          <p>Each message is processed independently — no conversation history is retained. Configure your API key and start the Python server to begin.</p>
          <div class="welcome-chips">${chips}</div>
        </div>
      `;

      document.querySelectorAll('.welcome-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          el.promptInput.value = chip.dataset.prompt;
          el.promptInput.focus();
          updateSendButton();
        });
      });
    }

    // ---- Config Persistence ----
    function loadConfig() {
      el.provider.value     = localStorage.getItem('lc_provider')      || 'groq';
      el.apiKey.value       = localStorage.getItem('lc_apiKey')        || '';
      el.modelName.value    = localStorage.getItem('lc_modelName')     || 'llama-3.3-70b-versatile';
      el.systemPrompt.value = localStorage.getItem('lc_systemPrompt')  || '';
      el.tempSlider.value   = localStorage.getItem('lc_temperature')   || '0.7';
      el.tempVal.innerText  = el.tempSlider.value;
      updateSendButton();
    }

    function saveConfig() {
      localStorage.setItem('lc_provider',     el.provider.value);
      localStorage.setItem('lc_apiKey',       el.apiKey.value);
      localStorage.setItem('lc_modelName',    el.modelName.value);
      localStorage.setItem('lc_systemPrompt', el.systemPrompt.value);
      localStorage.setItem('lc_temperature',  el.tempSlider.value);
    }

    // ---- Event Bindings ----
    // Model defaults per provider
    const MODEL_DEFAULTS = {
      groq:   'llama-3.3-70b-versatile',
      gemini: 'gemini-2.0-flash',
      openai: 'gpt-4o-mini',
    };

    el.provider.addEventListener('change', (e) => {
      const v = e.target.value;
      // Auto-switch model when provider changes
      const currentModel = el.modelName.value;
      const isDefaultOfOther = Object.values(MODEL_DEFAULTS).some(m => currentModel.includes(m.split('-')[0]));
      if (isDefaultOfOther || !currentModel) {
        el.modelName.value = MODEL_DEFAULTS[v];
      }
      saveConfig();
    });

    ['apiKey', 'modelName', 'systemPrompt'].forEach(key => {
      el[key].addEventListener('input', () => { saveConfig(); updateSendButton(); });
    });

    el.tempSlider.addEventListener('input', (e) => {
      el.tempVal.innerText = e.target.value;
      saveConfig();
    });

    // Textarea auto-resize
    el.promptInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
      updateSendButton();
    });

    el.promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!el.sendBtn.disabled) handleSend();
      }
    });

    // Dev Console toggle
    el.toggleDev.addEventListener('click', () => {
      state.isDevOpen = !state.isDevOpen;
      el.devConsole.classList.toggle('hidden', !state.isDevOpen);
      el.toggleDev.classList.toggle('active', state.isDevOpen);
    });

    // Clear chat
    el.clearBtn.addEventListener('click', () => {
      state.messageCount = 0;
      renderWelcome();
    });

    // Send button
    el.sendBtn.addEventListener('click', handleSend);

    function updateSendButton() {
      const hasKey  = el.apiKey.value.trim().length > 0;
      const hasText = el.promptInput.value.trim().length > 0;
      el.sendBtn.disabled = !(hasKey && hasText && !state.isGenerating);
    }

    // ---- UI Helpers ----
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
      toast.innerText = message;
      el.toasts.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(30px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function removeWelcome() {
      const welcome = document.getElementById('welcome-screen');
      if (welcome) {
        welcome.style.opacity = '0';
        welcome.style.transform = 'translateY(-10px)';
        welcome.style.transition = 'all 0.3s ease';
        setTimeout(() => welcome.remove(), 300);
      }
    }

    function createTimestamp() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;

      // Avatar
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.innerHTML = role === 'user'
        ? '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>'
        : '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>';

      // Content
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';

      if (role === 'user') {
        contentDiv.innerText = content;
      } else {
        contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content || ''));
      }

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(contentDiv);
      el.chatHistory.appendChild(msgDiv);
      scrollToBottom();
      return contentDiv;
    }

    function addThinkingIndicator() {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message bot thinking-msg';
      msgDiv.innerHTML = `
        <div class="msg-avatar">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        <div class="message-content thinking-indicator">
          <div class="dot-container">
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
          </div>
          <span class="thinking-label">Thinking…</span>
        </div>
      `;
      el.chatHistory.appendChild(msgDiv);
      scrollToBottom();
      return msgDiv;
    }

    function scrollToBottom() {
      el.chatHistory.scrollTop = el.chatHistory.scrollHeight;
    }

    function logDev(type, title, code) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `
        <div class="log-time">${time}</div>
        <div class="log-type ${type}">${title}</div>
        <div class="log-code"><pre>${code}</pre></div>
      `;
      el.devContent.appendChild(entry);
      el.devContent.scrollTop = el.devContent.scrollHeight;
    }

    // ---- Core Chat Logic — Calls Python Backend ----
    async function handleSend() {
      const promptText = el.promptInput.value.trim();
      if (!promptText) return;

      // Don't send the placeholder — let the backend use its .env key
      const rawKey       = el.apiKey.value.trim();
      const apiKey       = (rawKey === 'loaded-from-env') ? '' : rawKey;
      const provider     = el.provider.value;
      const model        = el.modelName.value.trim();
      const temp         = parseFloat(el.tempSlider.value);
      const systemPrompt = el.systemPrompt.value.trim();

      // Reset input
      el.promptInput.value = '';
      el.promptInput.style.height = 'auto';
      state.isGenerating = true;
      updateSendButton();

      // Remove welcome if first message
      if (state.messageCount === 0) removeWelcome();
      state.messageCount++;

      // Append user message
      appendMessage('user', promptText);
      const thinkingNode = addThinkingIndicator();

      const payload = {
        provider,
        api_key: apiKey,
        model,
        temperature: temp,
        prompt: promptText,
        system_prompt: systemPrompt,
      };

      logDev('invoke', `POST /chat → ${provider.toUpperCase()}`, JSON.stringify(payload, null, 2));

      try {
        const response = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `Server responded with ${response.status}`);
        }

        // Remove thinking indicator
        thinkingNode.remove();

        // Create bot message container
        const botDiv = document.createElement('div');
        botDiv.className = 'message bot';
        botDiv.innerHTML = `
          <div class="msg-avatar">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
          </div>
        `;
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        botDiv.appendChild(contentDiv);
        el.chatHistory.appendChild(botDiv);

        // ---- Read SSE stream from Python backend ----
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          // Process complete SSE lines
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line in buffer

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data: ')) continue;

            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;

            try {
              const parsed = JSON.parse(data);
              if (parsed.error) {
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(`**Error:** ${parsed.error}`));
                logDev('error', 'STREAM ERROR', parsed.error);
                showToast(parsed.error, 'error');
                break;
              }
              if (parsed.content) {
                fullContent += parsed.content;
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(fullContent));
                scrollToBottom();
              }
            } catch (parseErr) {
              // Skip non-JSON lines
            }
          }
        }

        if (fullContent) {
          logDev('stream', 'STREAM COMPLETE', `Response: ${fullContent.length} chars`);
          showToast('Response received', 'success');
        } else if (!contentDiv.innerHTML) {
          contentDiv.innerHTML = '<em style="color:var(--accent-rose)">No response. Check your API key in .env</em>';
          logDev('error', 'EMPTY', 'No content received. Verify API key.');
        }

      } catch (error) {
        if (document.contains(thinkingNode)) thinkingNode.remove();
        logDev('error', 'ERROR', error.toString());
        showToast(error.message || 'Error — check Dev Console', 'error');
        appendMessage('bot', `**Error:** ${error.message}`);
      } finally {
        state.isGenerating = false;
        updateSendButton();
      }
    }

    // ---- Fetch server-side config from .env ----
    async function fetchServerConfig() {
      try {
        const res = await fetch(`${API_BASE}/config`);
        if (!res.ok) return;
        const cfg = await res.json();

        // Apply server defaults
        el.provider.value  = cfg.provider || el.provider.value;
        el.modelName.value = cfg.model    || el.modelName.value;
        el.tempSlider.value = cfg.temperature ?? el.tempSlider.value;
        el.tempVal.innerText = el.tempSlider.value;

        if (cfg.has_api_key) {
          // Server has an API key in .env — no need to enter one
          el.apiKey.value = 'loaded-from-env';
          el.apiKey.placeholder = 'Loaded from .env';
          el.apiKey.disabled = true;
          el.apiKey.style.opacity = '0.6';
          showToast('API key loaded from .env', 'success');
        }

        saveConfig();
        updateSendButton();
        logDev('info', 'CONFIG', `Server defaults loaded:\n${JSON.stringify(cfg, null, 2)}`);
      } catch (e) {
        logDev('error', 'CONFIG', `Could not reach backend at ${API_BASE}\n${e.message}`);
      }
    }

    // ---- Initialize ----
    loadConfig();
    renderWelcome();
    fetchServerConfig();

    logDev('info', 'SYSTEM', `Frontend initialized.\nBackend: ${API_BASE}\nMode: Stateless (no memory)`);
  </script>
</body>
</html>
